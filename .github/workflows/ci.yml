name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Compile Python sources
        run: python -m compileall .
      - name: Import smoke test
        run: python scripts/import_smoke.py
      - name: Validate pre-live safety gates
        run: python validate_pre_live.py --ci
      - name: Secret scan
        run: python scripts/check_no_secrets.py
      - name: Run pytest with coverage
        run: pytest -q --cov=. --cov-report=term-missing --cov-fail-under=25
