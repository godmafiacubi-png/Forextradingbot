name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python sources
        run: python -m compileall .
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run pytest
        run: pytest
