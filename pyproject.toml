[tool.ruff]
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "models",
    "backtest_results",
]

[tool.ruff.lint]
# Start with correctness-focused rules so CI adds value without forcing a full
# legacy style cleanup in one PR. The rule set can be tightened incrementally.
select = ["E9", "F63", "F7", "F82"]
